<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rio Pinto – Domingo Fotos</title>
<style>
  @font-face { font-family:'MontserratBold';   src:url('Montserrat-Bold.ttf') format('truetype'); }
  @font-face { font-family:'MontserratBlack';  src:url('Montserrat-Black.ttf') format('truetype'); }
  @font-face { font-family:'MontserratMedium'; src:url('Montserrat-Medium.ttf') format('truetype'); }

  * { margin:0; padding:0; box-sizing:border-box; }

  html, body {
    width:350px; height:1080px;
    overflow:hidden;
    background:#f0001e;
  }

  #app {
    width:350px; height:1080px;
    position:relative;
    background:#f0001e;
  }

  /* ── HEADER: blanco, 130px alto ── */
  #header {
    position:absolute;
    top:0; left:0;
    width:350px; height:130px;
    background:#fff;
    display:flex; align-items:center; justify-content:center;
  }
  #header img {
    height:72px;
    object-fit:contain;
  }

  /* ── FOTO FRAME ──
     top = 130 (header) + 70 (gap) = 200px
     width = 300px, centrado: left = (350-300)/2 = 25px
  ── */
  #foto-wrapper {
    position:absolute;
    top:200px;
    left:25px;
    width:300px; height:300px;
    border-radius:18px;
    overflow:hidden;
    background:#f5e0e0;
  }

  .foto-slide {
    position:absolute; inset:0;
    opacity:0;
    transition:opacity 2s ease;
  }
  .foto-slide.active { opacity:1; z-index:2; }
  .foto-slide.prev   { opacity:0; z-index:1; }

  .foto-slide img {
    width:100%; height:100%;
    object-fit:cover; display:block;
  }

  #waiting {
    position:absolute; inset:0; z-index:3;
    display:flex; flex-direction:column;
    align-items:center; justify-content:center; gap:10px;
    background:#f5e0e0;
  }
  #waiting .wait-icon { font-size:2.8rem; }
  #waiting .wait-text {
    font-family:'MontserratBold',sans-serif;
    font-size:0.85rem; color:#c0002a;
    text-transform:uppercase; letter-spacing:0.1em;
    text-align:center; line-height:1.5;
  }
  #waiting.hidden { display:none; }

  /* ── TEXT ──
     top = 200 (foto top) + 300 (foto height) + 113 (gap) = 613px
  ── */
  #bottom-text {
    position:absolute;
    top:545px;
    width:350px;
    text-align:center;
    line-height:0.9;
  }
  #bottom-text .medium {
    font-family:'MontserratMedium',sans-serif;
    font-size:2rem;
    color:#fff;
    display:block;
  }
  #bottom-text .bold {
    font-family:'MontserratBold',sans-serif;
    font-size:2rem;
    color:#fff;
    display:block;
  }

  /* ── QR ── */
  #qr-section {
    position:absolute;
    top:712px;
    width:350px;
    display:flex; justify-content:center;
  }
  #qr-img {
    width:220px; height:220px;
    border-radius:14px;
    background:#fff; padding:8px;
    display:block;
  }

  /* ── FLASH ── */
  .flash-new {
    position:fixed; top:0; left:0; right:0; height:4px;
    background:linear-gradient(90deg,#fff,rgba(255,255,255,0.4),#fff);
    z-index:40; animation:flashBar 0.8s ease forwards; pointer-events:none;
  }
  @keyframes flashBar {
    0%  { opacity:1; transform:scaleX(0); transform-origin:left; }
    40% { opacity:1; transform:scaleX(1); }
    100%{ opacity:0; transform:scaleX(1); }
  }
</style>
</head>
<body>
<div id="app">

  <!-- HEADER BLANCO -->
  <div id="header">
    <img src="LOGORIOPINTO.png" alt="Rio Pinto">
  </div>

  <!-- FOTO FRAME -->
  <div id="foto-wrapper">
    <div id="waiting">
      <div class="wait-icon">📷</div>
      <div class="wait-text">Esperando<br>fotos...</div>
    </div>
  </div>

  <!-- TEXTO -->
  <div id="bottom-text">
    <span class="medium">¡Escaneá y</span>
    <span class="medium">mandá</span>
    <span class="bold">tu mensaje</span>
    <span class="bold">o tu foto!</span>
  </div>

  <!-- QR -->
  <div id="qr-section">
    <img id="qr-img"
      src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=https://jolly-lolly-57146d.netlify.app/&color=000000&bgcolor=ffffff&qzone=1&format=png"
      alt="QR Code">
  </div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, onChildAdded, onChildRemoved, query, orderByChild, equalTo }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey:            "AIzaSyDXf_yUP18qbsAweA3PwIGiIrK4NLVEJI0",
  authDomain:        "riopinto-dom.firebaseapp.com",
  databaseURL:       "https://riopinto-dom-default-rtdb.firebaseio.com",
  projectId:         "riopinto-dom",
  storageBucket:     "riopinto-dom.firebasestorage.app",
  messagingSenderId: "271649446795",
  appId:             "1:271649446795:web:b21c5a1ba17e65a7ea6d8e"
};

const app = initializeApp(firebaseConfig);
const db  = getDatabase(app);

const DISPLAY_TIME = 8000;
const TRANSITION   = 2000;

const wrapper = document.getElementById('foto-wrapper');
const waiting = document.getElementById('waiting');

let photos     = [];
let currentIdx = -1;
let timer      = null;

function makeSlide(url) {
  const div = document.createElement('div');
  div.className = 'foto-slide';
  const img = document.createElement('img');
  img.src = url; img.alt = '';
  div.appendChild(img);
  wrapper.appendChild(div);
  return div;
}

function showIdx(idx) {
  if (photos.length === 0) {
    waiting.classList.remove('hidden');
    return;
  }
  waiting.classList.add('hidden');

  const prev = wrapper.querySelector('.foto-slide.active');
  if (prev) {
    prev.classList.remove('active');
    prev.classList.add('prev');
    setTimeout(() => { prev.classList.remove('prev'); }, TRANSITION + 100);
  }

  const foto = photos[idx];
  const slide = makeSlide(foto.url);
  slide.getBoundingClientRect(); // force reflow
  slide.classList.add('active');

  setTimeout(() => {
    wrapper.querySelectorAll('.foto-slide:not(.active)').forEach(el => el.remove());
  }, TRANSITION + 200);
}

function advance() {
  if (photos.length === 0) return;
  currentIdx = (currentIdx + 1) % photos.length;
  showIdx(currentIdx);
  timer = setTimeout(advance, DISPLAY_TIME);
}

function startIfNeeded() {
  if (timer === null && photos.length > 0) {
    currentIdx = 0;
    showIdx(0);
    timer = setTimeout(advance, DISPLAY_TIME);
  }
}

function flashBar() {
  const el = document.createElement('div');
  el.className = 'flash-new';
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 900);
}

let initialized = false;
const approvedRef = query(ref(db,'fotos'), orderByChild('aprobado'), equalTo(true));

onChildAdded(approvedRef, snap => {
  const d = snap.val();
  const img = new Image(); img.src = d.url;
  photos.push({ key: snap.key, url: d.url });
  if (initialized) {
    flashBar();
    if (photos.length === 1) startIfNeeded();
  }
});

onChildRemoved(approvedRef, snap => {
  const i = photos.findIndex(f => f.key === snap.key);
  if (i !== -1) photos.splice(i, 1);
  if (currentIdx >= photos.length) currentIdx = 0;
  if (photos.length === 0) {
    clearTimeout(timer); timer = null;
    wrapper.querySelectorAll('.foto-slide').forEach(el => el.remove());
    waiting.classList.remove('hidden');
  }
});

setTimeout(() => {
  initialized = true;
  startIfNeeded();
}, 1200);
</script>
</body>
</html>
